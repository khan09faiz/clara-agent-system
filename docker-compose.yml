version: "3.8"

services:
  clara-pipeline:
    build: .
    container_name: clara-pipeline
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./versions:/app/versions
      - ./.env:/app/.env
    environment:
      - LLM_BACKEND=${LLM_BACKEND:-rule_based}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3}
    depends_on:
      - ollama
    command: ["python", "batch_run.py", "--demo_dir", "data/demo", "--onboarding_dir", "data/onboarding"]

  ollama:
    image: ollama/ollama:latest
    container_name: clara-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  n8n:
    image: n8nio/n8n:latest
    container_name: clara-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-changeme}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/home/node/workflows
      - ./data:/home/node/data
      - ./output:/home/node/output

volumes:
  ollama_data:
  n8n_data:
